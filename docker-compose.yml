services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME:${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD:${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE:${MONGO_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - mongo_network

  nextjs:
    container_name: nextjs
    # Tag so `docker compose up --build` always refreshes the app image when sources change.
    image: mjcarros-ecommerce-nextjs:local
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${NEXTJS_PORT}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DOCKER=true
      # App must reach Mongo by Compose service name + container port (not localhost / host port).
      - DATABASE_URL=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=${MONGO_AUTH_SOURCE:-mjcarros}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mongo_network
    volumes:
      - ./public/uploads:/app/public/uploads:rw

networks:
  mongo_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
