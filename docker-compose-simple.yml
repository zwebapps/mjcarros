# Fixed project + volume names so MongoDB data survives `docker compose down` / `up`.
name: mjcarros

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init-simple.js:/docker-entrypoint-initdb.d/mongo-init-simple.js:ro
    command: mongod --auth
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 40s

  nextjs:
    container_name: nextjs
    image: mjcarros-ecommerce-nextjs:simple
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DOCKER: "true"
      # Overrides `.env` DATABASE_URL when it points at localhost — app must use the `mongodb` service name.
      DATABASE_URL: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=${MONGO_AUTH_SOURCE:-mjcarros}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads:rw

volumes:
  mongodb_data:
    name: mjcarros_mongodb_data
