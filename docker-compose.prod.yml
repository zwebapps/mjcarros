name: mjcarros

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}

      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db
      - ./mongo-init-simple.js:/docker-entrypoint-initdb.d/mongo-init-simple.js:ro

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  nextjs:
    container_name: nextjs
    restart: unless-stopped
    image: mjcarros-nextjs:prod

    build:
      context: .
      dockerfile: Dockerfile

    env_file:
      - .env

    ports:
      - "8080:3000"

    depends_on:
      mongodb:
        condition: service_healthy

    environment:
      NODE_ENV: production
      DOCKER: "true"

      # Mongo
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE}

      # Admin
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}

      # App
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: http://localhost:8080

      # Payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}

      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_ENV: ${PAYPAL_ENV}

      # Email
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}

    volumes:
      # persistent uploads (SAFE)
      - ./public/uploads:/app/public/uploads:rw

    command: >
      sh -c "
        echo '⏳ Waiting for MongoDB...' &&
        sleep 5 &&
        echo '👤 Creating admin user...' &&
        npm run setup-admin &&
        echo '🚀 Starting Next.js...' &&
        npm run start
      "

volumes:
  mongodb_data:
    name: mjcarros_mongodb_data